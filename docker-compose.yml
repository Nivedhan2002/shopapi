services:
  web:
    build: .
    command: sh -c "python manage.py migrate && gunicorn ShopAPI.wsgi:application --bind 0.0.0.0:8000"
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  celery:
    build: .
    command: celery -A ShopAPI worker -l info
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shopapi}
      POSTGRES_USER: ${POSTGRES_USER:-shopapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shopapi}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
